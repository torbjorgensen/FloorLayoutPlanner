<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Floor Layout Planner – {{ project_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <div>
        <h1>Floor Layout Planner</h1>
        <p>{{ project_name }}</p>
    </div>
    <div class="controls">
        <button id="restartAllButton">Restart all rooms</button>
    </div>
</header>

<main>
    <section class="viewer">
        <canvas id="floorCanvas"></canvas>
    </section>

    <aside>
        <div class="card">
            <h2>Rooms</h2>
            <select id="roomSelect"></select>
        </div>

        <div class="card settings-card">
            <h2>Settings for <span id="selectedRoomName">room</span></h2>
            <form id="settingsForm">
                <label>
                    Laying direction
                    <select name="orientation">
                        <option value="horizontal">Horizontal</option>
                        <option value="vertical">Vertical</option>
                    </select>
                </label>

                <div class="two-columns">
                    <label>
                        Expansion gap (mm)
                        <input name="expansion_gap_mm" type="number" min="0" step="0.5">
                    </label>
                    <label>
                        Minimum piece (mm)
                        <input name="minimum_piece_length_mm" type="number" min="1" step="1">
                    </label>
                    <label>
                        Minimum joint distance (mm)
                        <input name="minimum_joint_distance_mm" type="number" min="0" step="1">
                    </label>
                    <label>
                        Stagger step (mm)
                        <input name="stagger_step_mm" type="number" min="1" step="1">
                    </label>
                </div>

                <details>
                    <summary>More settings</summary>
                    <div class="two-columns details-grid">
                        <label>
                            Board length (mm)
                            <input name="board_length_mm" type="number" min="1" step="1">
                        </label>
                        <label>
                            Board width (mm)
                            <input name="board_width_mm" type="number" min="1" step="0.1">
                        </label>
                        <label>
                            Search step (mm)
                            <input name="optimization_step_mm" type="number" min="0.1" step="0.1">
                        </label>
                        <label>
                            Row width step (mm)
                            <input name="row_width_optimization_step_mm" type="number" min="0.1" step="0.1">
                        </label>
                        <label>
                            Absolute min. row width (mm)
                            <input name="minimum_row_width_mm" type="number" min="1" step="1">
                        </label>
                        <label>
                            Preferred min. row width (mm)
                            <input name="preferred_minimum_row_width_mm" type="number" min="1" step="1">
                        </label>
                        <label>
                            Workers
                            <input name="optimizer_workers" type="number" min="1" step="1">
                        </label>
                        <label>
                            Show every Nth result
                            <input name="preview_every_n_results" type="number" min="1" step="1">
                        </label>
                        <label>
                            Local optimize top N
                            <input name="local_optimize_top_n" type="number" min="1" step="1">
                        </label>
                        <label>
                            Delay per new best (ms)
                            <input name="frame_delay_ms" type="number" min="0" step="1">
                        </label>
                        <label>
                            Waste (%)
                            <input name="waste_percent" type="number" min="0" step="0.1">
                        </label>
                        <label>
                            Boards per pack
                            <input name="boards_per_pack" type="number" min="1" step="1">
                        </label>
                    </div>
                </details>

                <div id="validationMessage" class="form-message"></div>

                <div class="form-actions">
                    <button type="submit" class="primary">Apply and restart room</button>
                    <button type="button" id="saveConfigButton">Save room to JSON</button>
                    <button type="button" id="resetConfigButton">Reset room</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Status</h2>
            <p id="statusText">Connecting …</p>
            <progress id="progressBar" value="0" max="1"></progress>
            <div class="room-actions">
                <button id="pauseButton">Pause</button>
                <button id="resumeButton">Resume</button>
                <button id="restartButton">Restart room</button>
            </div>
        </div>

        <div class="card">
            <h2>Best solution</h2>
            <div id="bestStats">–</div>
        </div>

        <div class="card">
            <h2>Profiling</h2>
            <div id="profileStats">–</div>
        </div>

        <div class="card">
            <h2>Output</h2>
            <p id="outputFiles">Generated per room when the search finishes.</p>
        </div>
    </aside>
</main>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
